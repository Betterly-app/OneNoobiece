<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Pace Tracker</title>
	<link rel="icon" type="image/png" href="logo.png?v=2">
	<link rel="apple-touch-icon" href="logo.png">
	<meta name="apple-mobile-web-app-title" content="One Pace">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
		/* ===== BASE ===== */
		* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

		body {
			font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
			background-color: #F2F2F7;
			color: #1C1C1E;
			margin: 0;
			padding: 16px 16px 90px;
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		/* ===== CARTE PRINCIPALE ===== */
		.card {
			background: transparent;
			border-radius: 0;
			padding: 0;
			width: 100%;
			max-width: 390px;
			box-shadow: none;
			border: none;
		}

		h1 {
			margin: 8px 0 20px;
			display: flex;
			justify-content: center;
		}

		.logo-title-img {
			max-width: 160px;
			height: auto;
			max-height: 60px;
		}

		/* ===== ONGLETS CONTENU ===== */
		.tab-content { display: none; }
		.tab-content.active { display: block; }

		/* ===== BARRE DE PROGRESSION ===== */
		.progress-bar {
			width: 100%;
			background: #E5E5EA;
			border-radius: 100px;
			overflow: hidden;
			height: 8px;
			margin: 12px 0 8px;
		}

		.progress-fill {
			height: 100%;
			background: linear-gradient(90deg, #E3000F, #FF453A);
			width: 0%;
			border-radius: 100px;
			transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
		}

		#percentage-text {
			font-size: 13px;
			font-weight: 500;
			color: #8E8E93;
			text-align: center;
			margin-bottom: 16px;
			letter-spacing: -0.1px;
		}

		/* ===== BOUTONS +1 / -1 ===== */
		.btn-group {
			display: flex;
			gap: 10px;
			margin: 0 0 20px;
			width: 100%;
		}

		button {
			font-family: inherit;
			font-weight: 600;
			border: none;
			cursor: pointer;
			transition: transform 0.1s ease, opacity 0.1s ease;
		}

		button:active { transform: scale(0.97); opacity: 0.85; }

		.btn-add {
			background: #E3000F;
			color: #fff;
			padding: 14px;
			font-size: 16px;
			border-radius: 14px;
			flex: 2;
			letter-spacing: -0.3px;
		}

		.btn-remove {
			background: #E5E5EA;
			color: #636366;
			padding: 14px;
			font-size: 16px;
			border-radius: 14px;
			flex: 1;
		}

		/* ===== SECTION HEADER ===== */
		.section-header {
			font-size: 13px;
			font-weight: 600;
			color: #8E8E93;
			text-transform: uppercase;
			letter-spacing: 0.5px;
			margin: 0 4px 8px;
		}

		/* ===== LISTE DES ARCS ===== */
		.arc-list {
			display: flex;
			flex-direction: column;
			gap: 2px;
			max-height: calc(100vh - 350px);
			overflow-y: auto;
			background: #fff;
			border-radius: 16px;
			padding: 0 4px;
		}

		.arc-item {
			background: #fff;
			padding: 11px 12px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			border: none;
			border-left: none;
			border-bottom: 0.5px solid #F2F2F7;
			box-shadow: none;
			border-radius: 0;
			margin: 0;
		}

		.arc-item:first-child { border-radius: 16px 16px 0 0; }
		.arc-item:last-child  { border-radius: 0 0 16px 16px; border-bottom: none; }

		.arc-item.completed  { background: #fff; }
		.arc-item.in-progress { background: #FFFBF0; }

		.arc-item.completed .arc-title  { color: #8E8E93; }
		.arc-item.in-progress .arc-title { color: #1C1C1E; }

		.arc-title {
			font-size: 15px;
			font-weight: 500;
			color: #C7C7CC;
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.arc-progress {
			font-size: 13px;
			font-weight: 600;
			color: #8E8E93;
			background: none;
			padding: 0;
		}

		.arc-item.in-progress .arc-progress { color: #facd2a; }
		.arc-item.completed   .arc-progress { color: #5663f0; }

		/* ===== BADGES ===== */
		.badge { font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 600; color: #fff; }
		.badge-kai { background: #8E8E93; }

		/* ===== BARRE DE RECHERCHE ===== */
		.search-bar {
			width: 100%;
			padding: 10px 14px;
			margin-bottom: 12px;
			background: #fff;
			border: none;
			border-radius: 12px;
			font-size: 15px;
			font-family: inherit;
			color: #1C1C1E;
			outline: none;
			box-sizing: border-box;
			box-shadow: none;
			-webkit-appearance: none;
		}

		.search-bar::placeholder { color: #C7C7CC; }

		/* ===== FILTRES ===== */
		.fruit-filters, .dico-filters {
			display: flex;
			gap: 6px;
			margin-bottom: 12px;
			flex-wrap: wrap;
		}

		.filter-btn, .dico-filter-btn {
			padding: 6px 14px !important;
			font-size: 13px !important;
			font-family: inherit;
			font-weight: 600;
			border-radius: 100px !important;
			border: none !important;
			background: #E5E5EA !important;
			color: #636366 !important;
			cursor: pointer;
			transition: all 0.15s ease;
			flex-shrink: 0;
		}

		.filter-btn.active-filter, .dico-filter-btn.active-dico {
			background: #E3000F !important;
			color: #fff !important;
		}

		.dico-filter-btn[data-cat="Fluide"].active-dico     { background: #0A84FF !important; }
		.dico-filter-btn[data-cat="Factions"].active-dico   { background: #E3000F !important; }
		.dico-filter-btn[data-cat="Géographie"].active-dico { background: #30D158 !important; color: #fff !important; }
		.dico-filter-btn[data-cat="Lore"].active-dico       { background: #BF5AF2 !important; }
		.dico-filter-btn[data-cat="Combat"].active-dico     { background: #FF9F0A !important; }
		.dico-filter-btn[data-cat="Divers"].active-dico     { background: #636366 !important; }

		/* ===== POKÉDEX ===== */
		.pokedex-grid {
			display: grid;
			grid-template-columns: repeat(2, 1fr);
			gap: 10px;
			max-height: calc(100vh - 280px);
			overflow-y: auto;
		}

		.char-card {
			background: #fff;
			border: none;
			border-radius: 14px;
			overflow: hidden;
			text-align: center;
		}

		.char-img {
			width: 100%;
			height: 130px;
			object-fit: contain;
			background: #F9F9F9;
			display: block;
		}

		.char-name {
			font-size: 12px;
			font-weight: 600;
			padding: 8px 6px;
			color: #1C1C1E;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		/* ===== FRUITS DU DÉMON ===== */
		.fruits-grid {
			display: flex;
			flex-direction: column;
			gap: 2px;
			max-height: calc(100vh - 300px);
			overflow-y: auto;
			background: #fff;
			border-radius: 16px;
		}

		.fruit-card {
			background: #fff;
			border: none;
			border-radius: 0;
			padding: 12px 14px;
			border-bottom: 0.5px solid #F2F2F7;
		}

		.fruit-card:first-child { border-radius: 16px 16px 0 0; }
		.fruit-card:last-child  { border-radius: 0 0 16px 16px; border-bottom: none; }

		.fruit-card-header {
			display: flex;
			justify-content: space-between;
			align-items: flex-start;
			gap: 8px;
			margin-bottom: 4px;
		}

		.fruit-name-fr {
			font-weight: 600;
			font-size: 15px;
			color: #1C1C1E;
			line-height: 1.3;
		}

		.fruit-name-jp {
			font-size: 12px;
			color: #C7C7CC;
			margin-top: 2px;
			font-style: normal;
		}

		.fruit-user {
			font-size: 12px;
			color: #8E8E93;
			margin: 4px 0 3px;
			font-weight: 500;
		}

		.fruit-power {
			font-size: 13px;
			color: #636366;
			line-height: 1.4;
		}

		.fruit-type-badge {
			font-size: 11px;
			font-weight: 700;
			padding: 3px 8px;
			border-radius: 100px;
			color: #fff;
			white-space: nowrap;
			flex-shrink: 0;
			margin-top: 2px;
		}

		.type-Paramecia    { background: #0A84FF; }
		.type-Zoan         { background: #30D158; }
		.type-Logia        { background: #E3000F; }
		.type-Zoan-Mythique{ background: #BF5AF2; }
		.type-Zoan-Antique { background: #FF9F0A; }

		/* ===== DICTIONNAIRE ===== */
		.dico-list {
			display: flex;
			flex-direction: column;
			gap: 2px;
			max-height: calc(100vh - 350px);
			overflow-y: auto;
			background: #fff;
			border-radius: 16px;
		}

		.dico-card {
			background: #fff;
			border: none;
			border-radius: 0;
			padding: 13px 14px;
			border-bottom: 0.5px solid #F2F2F7;
			cursor: pointer;
			transition: background 0.1s;
		}

		.dico-card:active { background: #F9F9F9; }
		.dico-card:first-child { border-radius: 16px 16px 0 0; }
		.dico-card:last-child  { border-radius: 0 0 16px 16px; border-bottom: none; }

		.dico-card-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 8px;
		}

		.dico-term {
			font-weight: 600;
			font-size: 15px;
			color: #1C1C1E;
			flex: 1;
		}

		.dico-cat-badge {
			font-size: 11px;
			font-weight: 700;
			padding: 3px 8px;
			border-radius: 100px;
			color: #fff;
			white-space: nowrap;
			flex-shrink: 0;
		}

		.cat-Fluide     { background: #0A84FF; }
		.cat-Factions   { background: #E3000F; }
		.cat-Géographie { background: #30D158; }
		.cat-Lore       { background: #BF5AF2; }
		.cat-Combat     { background: #FF9F0A; }
		.cat-Divers     { background: #636366; }

		.dico-arrow {
			font-size: 11px;
			color: #C7C7CC;
			transition: transform 0.2s ease;
			flex-shrink: 0;
		}
		.dico-arrow.open { transform: rotate(180deg); }

		.dico-def {
			font-size: 14px;
			color: #636366;
			line-height: 1.55;
			margin-top: 8px;
			display: none;
			padding-top: 8px;
			border-top: 0.5px solid #F2F2F7;
		}
		.dico-def.open { display: block; }

		/* ===== MODAL ===== */
		.modal-overlay {
			display: none;
			position: fixed;
			top: 0; left: 0; width: 100%; height: 100%;
			background: rgba(0,0,0,0.5);
			backdrop-filter: blur(4px);
			z-index: 1000;
			justify-content: center;
			align-items: flex-end;
			padding-bottom: env(safe-area-inset-bottom);
		}

		.modal-content {
			background: #F2F2F7;
			width: 100%;
			max-width: 390px;
			max-height: 75vh;
			border-radius: 22px 22px 0 0;
			padding: 20px 20px 32px;
			display: flex;
			flex-direction: column;
			animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
		}

		@keyframes slideUp {
			from { transform: translateY(100%); }
			to   { transform: translateY(0); }
		}

		.modal-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 16px;
		}

		.modal-title {
			font-weight: 700;
			font-size: 18px;
			color: #1C1C1E;
			margin: 0;
		}

		.close-btn {
			background: #E5E5EA;
			border: none;
			width: 30px;
			height: 30px;
			border-radius: 50%;
			font-size: 13px;
			color: #636366;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: 700;
			padding: 0;
		}

		.modal-body {
			overflow-y: auto;
			font-size: 15px;
			line-height: 1.6;
			color: #3A3A3C;
		}

		/* ===== NAV DU BAS ===== */
		.bottom-nav {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			background: rgba(249,249,249,0.92);
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
			border-top: 0.5px solid #D1D1D6;
			padding: 10px 0 calc(env(safe-area-inset-bottom) + 8px);
			z-index: 999;
		}

		.nav-btn {
			background: none;
			border: none;
			color: #8E8E93;
			font-size: 10px;
			font-weight: 500;
			font-family: inherit;
			padding: 6px 4px 6px;
			cursor: pointer;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 3px;
			transition: color 0.15s;
			letter-spacing: -0.1px;
		}

		.nav-btn::before {
			font-size: 22px;
			line-height: 1;
		}

		/* Icônes via ::before */
		.nav-btn:nth-child(1)::before { content: "⛵"; }
		.nav-btn:nth-child(2)::before { content: "📖"; }
		.nav-btn:nth-child(3)::before { content: "😈"; }
		.nav-btn:nth-child(4)::before { content: "📚"; }

		.nav-btn.active { color: #E3000F; }

		/* ===== SCROLLBARS ===== */
		::-webkit-scrollbar { width: 0; }

    </style>
</head>
<body>

    <div class="card">
        <h1><img src="https://upload.wikimedia.org/wikipedia/fr/thumb/1/1a/Logo_One_piece.svg/langfr-250px-Logo_One_piece.svg.png" alt="Test Logo" class="logo-title-img"></h1>
        
        <div id="tab-suivi" class="tab-content active">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div id="percentage-text">0% complété</div>

            <div class="btn-group">
                <button class="btn-remove" onclick="removeEpisode()">- 1</button>
                <button class="btn-add" onclick="addEpisode()">+1 viewed episode</button>
            </div>

			<p class="section-header">Progression par Arc</p>
            <div class="arc-list" id="arcs-container">
                </div>
        </div>

        <div id="tab-pokedex" class="tab-content">
			<p class="section-header">Pokédex</p>
			
            <input type="text" id="search-input" class="search-bar" placeholder="Chercher (ex: Luffy, Zoro...)" oninput="filterCharacters()">
            
            <div id="loading-msg" style="color: #888; font-size: 0.9em; margin-bottom: 10px;">Récupération des avis de recherche... 🏴‍☠️</div>
            
            <div class="pokedex-grid" id="pokedex-container"></div>
        </div>

		<div id="tab-fruits" class="tab-content">
			<p class="section-header">Fruits du Démon</p>
			<input type="text" id="fruit-search" class="search-bar" placeholder="Rechercher (ex: Gomu, Luffy...)" oninput="renderFruits()">
			<div class="fruit-filters">
				<button class="filter-btn active-filter" data-type="all" onclick="setFruitFilter('all', this)">Tous</button>
				<button class="filter-btn" data-type="Paramecia" onclick="setFruitFilter('Paramecia', this)">Paramecia</button>
				<button class="filter-btn" data-type="Zoan" onclick="setFruitFilter('Zoan', this)">Zoan</button>
				<button class="filter-btn" data-type="Logia" onclick="setFruitFilter('Logia', this)">Logia</button>
			</div>
			<div class="fruits-grid" id="fruits-container"></div>
		</div>

		<div id="tab-dico" class="tab-content">
			<p class="section-header">Dictionnaire</p>
			<input type="text" id="dico-search" class="search-bar" placeholder="Rechercher (ex: Haki, Ponéglyphe...)" oninput="renderDico()">
			<div class="dico-filters">
				<button class="dico-filter-btn active-dico" data-cat="all"        onclick="setDicoFilter('all',this)">Tous</button>
				<button class="dico-filter-btn" data-cat="Fluide"                 onclick="setDicoFilter('Fluide',this)">⚡ Fluide</button>
				<button class="dico-filter-btn" data-cat="Factions"               onclick="setDicoFilter('Factions',this)">🏴‍☠️ Factions</button>
				<button class="dico-filter-btn" data-cat="Géographie"             onclick="setDicoFilter('Géographie',this)">🗺️ Géo</button>
				<button class="dico-filter-btn" data-cat="Lore"                   onclick="setDicoFilter('Lore',this)">📜 Lore</button>
				<button class="dico-filter-btn" data-cat="Combat"                 onclick="setDicoFilter('Combat',this)">⚔️ Combat</button>
				<button class="dico-filter-btn" data-cat="Divers"                 onclick="setDicoFilter('Divers',this)">🔧 Divers</button>
			</div>
			<div class="dico-list" id="dico-container"></div>
		</div>

		<div class="bottom-nav">
			<button class="nav-btn active" onclick="switchTab('tab-suivi', this)">Progression</button>
			<button class="nav-btn" onclick="switchTab('tab-pokedex', this)">Pokédex</button>
			<button class="nav-btn" onclick="switchTab('tab-fruits', this)">Fruits</button>
			<button class="nav-btn" onclick="switchTab('tab-dico', this)">Dico</button>
		</div>
    </div>

	<div id="char-modal" class="modal-overlay" onclick="if(event.target === this) closeModal()">
		<div class="modal-content">
			<div class="modal-header">
				<h3 class="modal-title" id="modal-title">Nom du personnage</h3>
				<button class="close-btn" onclick="closeModal()">✖</button>
			</div>
			<div class="modal-body" id="modal-desc">
				Chargement des informations...
			</div>
		</div>
	</div>

    <script>
        // --- CONFIGURATION SUPABASE ---
		const SUPABASE_URL = 'https://opjwisewusutlrgvbegc.supabase.co';
		const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wandpc2V3dXN1dGxyZ3ZiZWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTg5NzcsImV4cCI6MjA5MDg5NDk3N30.qTQ5OOcF4LjaFmEIDaqPO46MjtiboH1s6gLbMYMJU6E';
        const ROW_ID = 1; // À REMPLACER PAR TON ID
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentWatched = 2;

        // --- DONNÉES DES ARCS ONE PACE (À compléter) ---
        // J'ai mis les premiers, tu peux rajouter la suite facilement !
        const ARCS = [
            { title: "Romance Dawn", count: 4 },
            { title: "Orange Town", count: 3 },
            { title: "Syrup Village", count: 5 },
            { title: "Gaimon", count: 1 },
            { title: "Baratie", count: 7 },
            { title: "Arlong Park", count: 14 },
            { title: "Loguetown", count: 2 },
            { title: "Reverse Mountain", count: 2 },
            { title: "Whisky Peak", count: 2 },
            { title: "Little Garden", count: 5 },
            { title: "Drum Island", count: 5 },
            { title: "Alabasta", count: 21 },
            { title: "Jaya", count: 8 },
            { title: "Skypiea", count: 25 },
            { title: "Long Ring Long Land", count: 7, version: "en" },
            { title: "Water Seven", count: 20 },
            { title: "Enies Lobby", count: 25 },
            { title: "Post Enies Lobby", count: 5, version: "en" },
            { title: "Thriller Bark", count: 22, version: "en" },
            { title: "Sabaody Archipelago", count: 11, version: "en" },
            { title: "Amazon Lily", count: 5 },
            { title: "Impel Down", count: 10, version: "en" },
            { title: "Cover Stories", count: 1 },
            { title: "Marine Ford", count: 17 },
            { title: "Post War", count: 8 },
            { title: "Return to Sabaody", count: 3 },
            { title: "FishMan Island", count: 24, version: "en" },
            { title: "Punk Hazard", count: 22, version: "en" },
            { title: "Dressrosa", count: 48, version: "en" },
            { title: "Zou", count: 10 },
            { title: "Whole Cake Island", count: 39 },
            { title: "Reverie", count: 3 },
            { title: "Wano", count: 59 },
            { title: "Egghead", count: 20 },
            // Ajoute les autres arcs ici au fur et à mesure...
        ];

        // Le total se calcule tout seul en additionnant les nombres ci-dessus !
        const TOTAL_EPISODES = ARCS.reduce((sum, arc) => sum + arc.count, 0);

        let allCharacters = []; // Variable qui va stocker la grande liste de l'API

        async function loadPokedex() {
            try {
                // On appelle l'API pour l'anime 21 (One Piece)
                const response = await fetch('https://api.jikan.moe/v4/anime/21/characters');
                const data = await response.json();
                
                allCharacters = data.data; 
                
                // On cache le texte "Récupération des avis de recherche..."
                document.getElementById('loading-msg').style.display = 'none';
                
                // On affiche les 20 premiers de la liste par défaut
                renderCharacters(allCharacters.slice(0, 20));
            } catch (error) {
                console.error("Erreur API :", error);
                document.getElementById('loading-msg').innerText = "Erreur de connexion aux escargophones ❌";
            }
        }

		// --- FONCTIONS DE LA POP-UP PERSONNAGE ---
        async function openCharacter(id) {
            const modal = document.getElementById('char-modal');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            
            // On affiche la fenêtre avec un texte d'attente
            modal.style.display = 'flex';
            title.innerText = "Chargement...";
            desc.innerText = "Recherche dans les archives de la Marine... 🏴‍☠️";

            try {
                // On fait une requête spécifique pour CE personnage
                const response = await fetch(`https://api.jikan.moe/v4/characters/${id}`);
                const data = await response.json();
                
                const character = data.data;
                title.innerText = character.name;
                
                // Si l'API possède une description ("about")
                if (character.about) {
                    // On remplace les sauts de ligne invisibles par des balises HTML <br> pour que ce soit joli
                    desc.innerHTML = character.about.replace(/\n/g, '<br>');
                } else {
                    desc.innerText = "Aucune information trouvée pour ce personnage dans la base de données.";
                }
            } catch(e) {
                title.innerText = "Erreur de connexion";
                desc.innerText = "Impossible de récupérer les données des escargophones.";
            }
        }

        function closeModal() {
            document.getElementById('char-modal').style.display = 'none';
        }

        function renderCharacters(charactersToDisplay) {
            const container = document.getElementById('pokedex-container');
            container.innerHTML = ''; // On vide la grille

            charactersToDisplay.forEach(char => {
                const imgUrl = char.character.images.jpg.image_url;
                const name = char.character.name;

                // On crée la petite carte pour chaque personnage
                const div = document.createElement('div');
                div.className = 'char-card';
                // AJOUT : on rend toute la carte cliquable en passant l'ID du personnage !
                div.innerHTML = `
                    <div onclick="openCharacter(${char.character.mal_id})" style="cursor: pointer;">
                        <img src="${imgUrl}" class="char-img" alt="${name}" loading="lazy">
                        <div class="char-name">${name}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function filterCharacters() {
            // Récupère ce que tu tapes dans la barre (et met tout en minuscules)
            const searchText = document.getElementById('search-input').value.toLowerCase();
            
            // Si tu as effacé ta recherche, on remet les 20 premiers par défaut
            if (searchText.trim() === '') {
                renderCharacters(allCharacters.slice(0, 20));
                return;
            }

            // Sinon, on cherche dans la grande liste tous ceux qui contiennent les lettres tapées
            const filteredChars = allCharacters.filter(char => {
                const name = char.character.name.toLowerCase();
                return name.includes(searchText);
            });

            // On affiche le résultat (limité à 50 pour que le téléphone ne rame pas)
            renderCharacters(filteredChars.slice(0, 50));
        }

		// --- FONCTION DE CHANGEMENT D'ONGLET ---
        function switchTab(tabId, btnElement) {
            // 1. On cache toutes les boîtes d'onglets
            const allTabs = document.querySelectorAll('.tab-content');
            allTabs.forEach(tab => tab.classList.remove('active'));

            // 2. On affiche uniquement la boîte qu'on a demandé
            document.getElementById(tabId).classList.add('active');

            // 3. On "grise" tous les boutons du menu du bas
            const allBtns = document.querySelectorAll('.nav-btn');
            allBtns.forEach(btn => btn.classList.remove('active'));

            // 4. On met en rouge le bouton sur lequel on vient de cliquer
            btnElement.classList.add('active');
        }

        // --- FONCTIONS ---
        async function fetchProgress() {
            const { data, error } = await supabaseClient
                .from('one_noobiece') // OU 'one_pace_progress' selon ta table
                .select('episodes_watched')
                .eq('id', ROW_ID)
                .single();

            if (error) {
                console.error("Erreur de récupération:", error);
                return;
            }
            currentWatched = data.episodes_watched;
            updateUI();
        }

        async function addEpisode() {
            currentWatched++;
            updateUI(); 

            const { error } = await supabaseClient
                .from('one_noobiece') // Pareil, vérifie ton nom de table
                .update({ episodes_watched: currentWatched, updated_at: new Date().toISOString() })
                .eq('id', ROW_ID);

            if (error) {
                console.error("Erreur de sauvegarde:", error);
                currentWatched--; 
                updateUI();
            }
        }

		async function removeEpisode() {
			if (currentWatched > 0) {
				currentWatched--;
				updateUI(); // Mise à jour visuelle immédiate

				// Sauvegarde dans Supabase
				const { error } = await supabaseClient
					.from('one_noobiece') // <-- VÉRIFIE BIEN TON NOM DE TABLE ICI
					.update({ episodes_watched: currentWatched, updated_at: new Date().toISOString() })
					.eq('id', ROW_ID);

				if (error) {
					console.error("Erreur de sauvegarde:", error);
					currentWatched++; // Annulation si la base de données plante
					updateUI();
				}
			}
		}

        function updateUI() {
            // Mise à jour de la barre globale
            const percentage = Math.min(100, ((currentWatched / TOTAL_EPISODES) * 100)).toFixed(1);
            document.getElementById('progress-fill').style.width = percentage + '%';
            document.getElementById('percentage-text').innerText = `${currentWatched} / ${TOTAL_EPISODES} épisodes (${percentage}%)`;

            // Mise à jour de la liste des Arcs
            renderArcs();
        }

        function renderArcs() {
            const container = document.getElementById('arcs-container');
            container.innerHTML = ''; // On vide la liste avant de la recréer
            
            let episodesLeftToDistribute = currentWatched;

            ARCS.forEach(arc => {
                let watchedInThisArc = 0;
                
                // Calcul de combien d'épisodes de cet arc ont été vus
                if (episodesLeftToDistribute >= arc.count) {
                    watchedInThisArc = arc.count;
                    episodesLeftToDistribute -= arc.count;
                } else if (episodesLeftToDistribute > 0) {
                    watchedInThisArc = episodesLeftToDistribute;
                    episodesLeftToDistribute = 0;
                }

                // Création du visuel
                const div = document.createElement('div');
                div.className = 'arc-item';
                
                if (watchedInThisArc === arc.count) {
                    div.classList.add('completed');
                } else if (watchedInThisArc > 0) {
                    div.classList.add('in-progress');
                }

				let badgeHTML = '';
				if (arc.version === "en") {
					badgeHTML = `<span class="badge badge-kai">no fr</span>`;
				}

				div.innerHTML = `
					<div class="arc-title">${arc.title} ${badgeHTML}</div>
					<div class="arc-progress">${watchedInThisArc} / ${arc.count}</div>
				`;

                container.appendChild(div);
            });
        }

				term: "Nakama",
				cat: "Divers",
				def: "Mot japonais intraduisible littéralement, désignant quelque chose entre 'compagnon', 'allié' et 'ami de confiance'. Concept central de One Piece : Luffy ne combat pas pour des idéaux abstraits mais pour ses Nakama. Souvent laissé en japonais dans les traductions car aucun mot français ne capture exactement la profondeur du lien qu'il implique."
			},
			{
				term: "Pirate King (Roi des Pirates)",
				cat: "Divers",
				def: "Titre suprême du monde pirate, accordé à celui qui atteint Laugh Tale et trouve le One Piece. Gold Roger est le seul à l'avoir obtenu à ce jour. Son exécution publique à Loguetown, au lieu de décourager la piraterie, a déclenché la Grande Ère des Pirates en poussant des milliers d'hommes à prendre la mer."
			},
			{
				term: "Rumble Ball",
				cat: "Divers",
				def: "Drogue développée par Chopper lui-même qui modifie temporairement la résonance de son fruit du démon, lui permettant d'accéder à des transformations supplémentaires au-delà de ses trois formes naturelles. Une seule pilule dure 3 minutes. En consommer plus de 3 dans un court laps de temps entraîne une perte de contrôle et le Monster Point incontrôlable."
			},
			{
				term: "Ponéglyphe de Shandora",
				cat: "Divers",
				def: "Ponéglyphe situé à Skypiea, ancienne cité de Shandora emportée dans les cieux il y a 400 ans. Les Shandiens (descendants des guerriers de Shandora) le protégeaient depuis des générations sans pouvoir le lire. Il contient la localisation de l'Arme Antique Poséidon. Robin le déchiffre lors de l'arc Skypiea."
			},
			{
				term: "Calibre Zéro / Seastone Bullets",
				cat: "Divers",
				def: "Munitions enrobées de Granit Marin utilisées par certains agents du Gouvernement Mondial. Particulièrement efficaces contre les utilisateurs de fruits du démon car elles annulent momentanément leurs pouvoirs au point d'impact. Smoker utilise un jitte (bâton) recouvert de Granit Marin pour la même raison."
			},
		];

		let currentDicoFilter = 'all';

		function setDicoFilter(cat, btn) {
			currentDicoFilter = cat;
			document.querySelectorAll('.dico-filter-btn').forEach(b => b.classList.remove('active-dico'));
			btn.classList.add('active-dico');
			renderDico();
		}

		function toggleDico(card) {
			const def   = card.querySelector('.dico-def');
			const arrow = card.querySelector('.dico-arrow');
			def.classList.toggle('open');
			arrow.classList.toggle('open');
		}

		function renderDico() {
			const search = document.getElementById('dico-search').value.toLowerCase();
			const container = document.getElementById('dico-container');
			container.innerHTML = '';

			const filtered = DICO.filter(d => {
				const matchCat  = currentDicoFilter === 'all' || d.cat === currentDicoFilter;
				const matchText = d.term.toLowerCase().includes(search) || d.def.toLowerCase().includes(search);
				return matchCat && matchText;
			});

			if (filtered.length === 0) {
				container.innerHTML = '<p style="color:#888;font-size:0.9em;text-align:center;">Aucun terme trouvé 📖</p>';
				return;
			}

			filtered.forEach(d => {
				const div = document.createElement('div');
				div.className = 'dico-card';
				div.onclick = () => toggleDico(div);
				div.innerHTML = `
					<div class="dico-card-header">
						<span class="dico-term">${d.term}</span>
						<span class="dico-cat-badge cat-${d.cat}">${d.cat}</span>
						<span class="dico-arrow">▼</span>
					</div>
					<div class="dico-def">${d.def}</div>
				`;
				container.appendChild(div);
			});
		}

        // --- INITIALISATION ---
        fetchProgress();
		loadPokedex();
		renderFruits();
		renderDico();
    </script>
</body>
</html>
