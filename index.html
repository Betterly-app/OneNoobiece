<!DOCTYPE html>
<html lang="fr">
<head>
	<link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Pace Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { margin-top: 0; color: #ffeb3b; }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
            text-align: left;
        }
        .stat-box {
            background: #2c2c2c;
            padding: 10px;
            border-radius: 8px;
        }
        .stat-label { font-size: 0.8em; color: #aaa; }
        .stat-value { font-size: 1.2em; font-weight: bold; margin-top: 5px; }
        .progress-bar {
            width: 100%;
            background-color: #333;
            border-radius: 10px;
            overflow: hidden;
            height: 20px;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background-color: #4caf50;
            width: 0%;
            transition: width 0.5s ease;
        }
        button {
            background-color: #2196f3;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:active { background-color: #1976d2; }
    </style>
</head>
<body>

    <div class="card">
        <h1>One Pace Tracker</h1>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div id="percentage-text">0% complété</div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Épisodes vus</div>
                <div class="stat-value" id="eps-watched">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Restants</div>
                <div class="stat-value" id="eps-remaining">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Heures vues</div>
                <div class="stat-value" id="hours-watched">-- h</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Heures restantes</div>
                <div class="stat-value" id="hours-remaining">-- h</div>
            </div>
        </div>

        <button onclick="addEpisode()">+ 1 Épisode Vu</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'opjwisewusutlrgvbegc';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9wandpc2V3dXN1dGxyZ3ZiZWdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTg5NzcsImV4cCI6MjA5MDg5NDk3N30.qTQ5OOcF4LjaFmEIDaqPO46MjtiboH1s6gLbMYMJU6E';
        const TOTAL_EPISODES = 476; // Estimation du total actuel
        const MINS_PER_EP = 25; // Durée moyenne
        const ROW_ID = 2; // L'ID de ta ligne dans la DB

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentWatched = 0;

    // --- FONCTIONS ---
    async function fetchProgress() {
        // CORRECTION : On utilise supabaseClient
        const { data, error } = await supabaseClient
            .from('one_pace_progress')
            .select('episodes_watched')
            .eq('id', ROW_ID)
            .single();

        if (error) {
            console.error("Erreur de récupération:", error);
            return;
        }
        currentWatched = data.episodes_watched;
        updateUI();
    }

    async function addEpisode() {
        currentWatched++;
        updateUI(); // Maj optimiste pour la réactivité

        // CORRECTION : On utilise supabaseClient
        const { error } = await supabaseClient
            .from('one_pace_progress')
            .update({ episodes_watched: currentWatched, updated_at: new Date().toISOString() })
            .eq('id', ROW_ID);

        if (error) {
            console.error("Erreur de mise à jour:", error);
            currentWatched--; // Rollback en cas d'erreur
            updateUI();
            alert("Erreur lors de la sauvegarde !");
        }
    }

    function updateUI() {
        const remaining = Math.max(0, TOTAL_EPISODES - currentWatched);
        const percentage = ((currentWatched / TOTAL_EPISODES) * 100).toFixed(1);
        
        const hoursWatched = ((currentWatched * MINS_PER_EP) / 60).toFixed(1);
        const hoursRemaining = ((remaining * MINS_PER_EP) / 60).toFixed(1);

        document.getElementById('eps-watched').innerText = currentWatched;
        document.getElementById('eps-remaining').innerText = remaining;
        document.getElementById('hours-watched').innerText = hoursWatched + ' h';
        document.getElementById('hours-remaining').innerText = hoursRemaining + ' h';
        
        document.getElementById('progress-fill').style.width = percentage + '%';
        document.getElementById('percentage-text').innerText = percentage + '% complété';
    }

        // --- INITIALISATION ---
        fetchProgress();
    </script>
</body>
</html>
